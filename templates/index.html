<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#6366f1">
    <meta name="description" content="Convert ABC notation to MusicXML with real-time preview and audio playback">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ABC+">
    <title>ABC+ Converter</title>
    <link rel="manifest" href="{{ url_for('static', filename='site.webmanifest') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon-192.png') }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='icons/icon-96.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- OpenSheetMusicDisplay -->
    <script src="{{ url_for('static', filename='opensheetmusicdisplay.min.js') }}"></script>
    <script src="{{ url_for('static', filename='abcjs-basic-min.js') }}"></script>
</head>

<body>
    <header>
        <h1>ABC+ <span class="title-suffix">Converter</span> <span class="version-badge">v{{ version }}</span></h1>
        <div class="status-bar">
            <div id="status-dot" class="status-dot"></div>
            <span id="status-text">Ready</span>
        </div>
    </header>

    <!-- Update notification banner -->
    <div id="update-banner" class="update-banner hidden">
        <span><i class="fa-solid fa-rocket"></i> A new version (<span id="latest-version"></span>) is available!</span>
        <a href="#" id="update-link" target="_blank" class="update-download-btn">Download</a>
        <button id="dismiss-update" class="icon-btn dismiss-btn" title="Dismiss">×</button>
    </div>

    <main>
        <div class="editor-pane">
            <div class="pane-header">
                <span><i class="fa-solid fa-music"></i> Music Input</span>
                <div class="input-mode-toggle">
                    <button id="text-input-btn" class="toggle-btn active" title="Text Input" aria-label="Text Input Mode">
                        <i class="fa-solid fa-keyboard" aria-hidden="true"></i>
                    </button>
                    <button id="file-input-btn" class="toggle-btn" title="File Upload" aria-label="File Upload Mode">
                        <i class="fa-solid fa-upload" aria-hidden="true"></i>
                    </button>
                </div>
                <select id="example-select" class="example-select" title="Load an example ABC tune" aria-label="Load Example ABC Tune">
                    <option value="" disabled selected>Load Example...</option>
                    <option value="scale">Major Scale</option>
                    <option value="arpeggio">Arpeggio</option>
                    <option value="reels">The Merry Blacksmith (Reel)</option>
                    <option value="jig">The Kesh Jig</option>
                </select>
            </div>
            <div id="text-input-area">
                <textarea id="abc-input" placeholder="Paste your ABC notation here...
Example:
X:1
T:Scale
K:C
C D E F | G A B c |"></textarea>
            </div>
            <div id="file-input-area" class="hidden">
                <div class="file-upload-zone" id="file-upload-zone">
                    <i class="fa-solid fa-cloud-arrow-up upload-icon"></i>
                    <p class="upload-text">Drag & drop your music file here</p>
                    <p class="upload-subtext">or</p>
                    <input type="file" id="file-upload-input" class="hidden" aria-label="Upload Music File" title="Upload Music File">
                    <button id="browse-btn" class="primary-btn">Browse Files</button>
                    <p class="upload-hint">Supports: ABC, MusicXML, MIDI, LilyPond, MEI, Humdrum, NoteWorthy, and more!</p>
                </div>
                <div id="file-info" class="file-info hidden">
                    <i class="fa-solid fa-file-circle-check file-icon"></i>
                    <div class="file-details">
                        <span id="file-name" class="file-name"></span>
                        <span id="file-format" class="file-format"></span>
                    </div>
                    <button id="clear-file-btn" class="icon-btn" title="Remove file">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
            </div>
            <div class="format-selector-panel" id="target-format-panel" class="hidden">
                <label for="target-format-select">Convert to:</label>
                <select id="target-format-select" class="format-select"></select>
            </div>
        </div>

        <div class="editor-pane pane-dark">
            <div class="pane-header">
                <span><i class="fa-solid fa-code"></i> MusicXML Output</span>
                <div class="pane-actions">
                    <!-- View Toggle -->
                    <div class="view-toggle" role="group" aria-label="View Mode">
                        <button id="view-code-btn" class="toggle-btn active" title="Show XML Code" aria-label="Show MusicXML Source Code">
                            <i class="fa-solid fa-code" aria-hidden="true"></i>
                        </button>
                        <button id="view-sheet-btn" class="toggle-btn" title="Show Sheet Music" aria-label="Show Rendered Sheet Music">
                            <i class="fa-solid fa-music" aria-hidden="true"></i>
                        </button>
                    </div>
                    <div class="separator" role="separator" aria-orientation="vertical"></div>

                    <!-- Playback Controls (Hidden in Code View) -->
                    <div id="playback-controls" class="playback-controls hidden" role="toolbar" aria-label="Audio Playback Controls">
                        <div class="bpm-control" title="Tempo (BPM)">
                            <i class="fa-solid fa-gauge-high" aria-hidden="true"></i>
                            <input type="number" id="bpm-input" value="100" min="30" max="300" step="10" aria-label="Tempo in Beats Per Minute">
                        </div>
                        <button id="play-btn" class="icon-btn" title="Play Audio" aria-label="Play Synthesized Audio">
                            <i class="fa-solid fa-play" aria-hidden="true"></i>
                        </button>
                        <button id="stop-btn" class="icon-btn" title="Stop Audio" aria-label="Stop Synthesized Audio">
                            <i class="fa-solid fa-stop" aria-hidden="true"></i>
                        </button>
                    </div>
                    <div class="separator" role="separator" aria-orientation="vertical"></div>

                    <button id="copy-btn" class="icon-btn" title="Copy XML to Clipboard" aria-label="Copy MusicXML to Clipboard">
                        <i class="fa-regular fa-copy" aria-hidden="true"></i>
                    </button>
                    <button id="download-btn" class="icon-btn" title="Download XML" aria-label="Download MusicXML File">
                        <i class="fa-solid fa-download" aria-hidden="true"></i>
                    </button>
                    <button id="download-midi-btn" class="icon-btn" title="Download MIDI" aria-label="Download MIDI Audio File">
                        <i class="fa-solid fa-file-audio" aria-hidden="true"></i>
                    </button>
                    <div class="format-selector">
                        <select id="format-select" class="format-select" title="Select output format" aria-label="Select Target Export Format">
                            <option value="musicxml">MusicXML</option>
                            <option value="midi">MIDI</option>
                            <option value="lilypond">LilyPond</option>
                        </select>
                        <button id="download-format-btn" class="icon-btn" title="Download selected format" aria-label="Download Selected File Format">
                            <i class="fa-solid fa-file-arrow-down" aria-hidden="true"></i>
                        </button>
                        <button id="download-all-btn" class="primary-btn" title="Convert to All Formats" aria-label="Convert and Download All Formats Archive">
                            <i class="fa-solid fa-file-zipper" aria-hidden="true"></i> Convert to All
                        </button>
                    </div>
                    <button id="save-session-btn" class="icon-btn" title="Save Project to App Folder">
                        <i class="fa-solid fa-folder-plus"></i>
                    </button>
                    <button id="download-debug-btn" class="icon-btn" title="Download Debug Report (.md)">
                        <i class="fa-solid fa-bug"></i>
                    </button>
                </div>
            </div>
            <textarea id="output-xml" readonly placeholder="XML output will appear here..."></textarea>
            <div id="osmd-container" class="sheet-container hidden"></div>

            <div class="logs-container">
                <div class="pane-header sub-header">
                    <span><i class="fa-solid fa-triangle-exclamation"></i> Validation Logs</span>
                    <button id="copy-logs-btn" class="icon-btn" title="Copy Logs to Clipboard">
                        <i class="fa-regular fa-copy"></i>
                    </button>
                </div>
                <textarea id="output-logs" readonly
                    placeholder="Warnings and logs (e.g., 'Too many beats') will appear here..."></textarea>
            </div>
        </div>
    </main>

    <div class="fab-container">
        <button id="convert-btn" class="primary-btn">
            <i class="fa-solid fa-bolt"></i> Convert
        </button>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script>
        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/static/sw.js')
                    .then(reg => console.log('SW registered:', reg.scope))
                    .catch(err => console.log('SW registration failed:', err));
            });
        }
    </script>
</body>

</html>
